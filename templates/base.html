<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} | Knowledge Base</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="{base_path}/assets/css/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-layer-group"></i> InfoSec Base</h1>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar inteligência... (Ctrl+K)" autocomplete="off">
                    <div class="search-results"></div>
                </div>
            </div>
            <div class="nav-tree-container">
                <nav>{navigation}</nav>
            </div>
            <div class="sidebar-resizer" id="sidebar-resizer"></div>
        </aside>
        
        <main class="main-content">
            <header class="content-header">
                <div class="breadcrumbs">
                    <a href="{base_path}/index.html"><i class="fas fa-home"></i> Home</a>
                    {breadcrumbs}
                </div>
            </header>
            
            <article class="content-body">
                <div class="markdown-content">{content}</div>
            </article>
        </main>
    </div>
    
    <div id="lightbox-overlay" class="lightbox-overlay">
        <img class="lightbox-img" src="" alt="Imagem Ampliada">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el)));</script>
    <script src="{base_path}/assets/js/main.js"></script>
</body>
</html>
